<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Storage & Media Management Proposal</title>
    <style>
        :root {
            --primary: #1a252f;
            --secondary: #f4f4f9;
            --text: #333;
            --cheap: #6c757d;
            --good: #28a745;
            --better: #fd7e14;
            --best: #6f42c1;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text);
            background-color: #f8f9fa;
            margin: 0;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 20px 20px;
            background: var(--primary);
            color: white;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        h1 { margin: 0; font-size: 1.8rem; }
        p.subtitle { font-size: 1rem; margin-top: 5px; color: #adb5bd; }

        /* Navigation */
        .nav-links {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 4px;
            transition: background 0.3s;
        }
        .nav-links a:hover {
            background: rgba(255,255,255,0.2);
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        /* Tier Blocks */
        .tier-block {
            background: white;
            padding: 25px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            border-top: 6px solid #ccc;
        }
        .tier-block.cheap { border-top-color: var(--cheap); }
        .tier-block.good { border-top-color: var(--good); }
        .tier-block.better { border-top-color: var(--better); }
        .tier-block.best { border-top-color: var(--best); }

        .tier-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .tier-header h3 {
            margin: 0;
            font-size: 1.5rem;
        }
        .tier-block.cheap h3 { color: var(--cheap); }
        .tier-block.good h3 { color: var(--good); }
        .tier-block.better h3 { color: var(--better); }
        .tier-block.best h3 { color: var(--best); }

        .tier-price {
            font-size: 1.2rem;
            font-weight: bold;
            background: #f1f3f5;
            padding: 6px 15px;
            border-radius: 8px;
            color: var(--primary);
        }

        /* Compact Tier Layout */
        .tier-layout {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            align-items: flex-start;
        }
        .tier-images {
            flex: 1;
            min-width: 220px;
            max-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }
        .tier-images img {
            max-width: 100%;
            height: 130px;
            object-fit: contain;
            border-radius: 8px;
            background: #f8f9fa;
            padding: 10px;
            border: 1px solid #dee2e6;
        }
        .tier-image-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            justify-content: center;
            width: 100%;
        }
        .tier-image-group img {
            height: auto;
            max-height: 100px;
            flex: 1;
            min-width: 0;
        }
        .tier-info {
            flex: 2;
            min-width: 300px;
        }
        .tier-info p { margin-top: 0; margin-bottom: 10px; }
        .tier-info ul { margin-bottom: 15px; padding-left: 20px; }
        .tier-info li { margin-bottom: 5px; }

        .pros-cons {
            font-size: 0.95rem;
            background: #f8f9fa;
            padding: 12px 15px;
            border-radius: 8px;
            border-left: 4px solid #ccc;
        }
        .cheap .pros-cons { border-left-color: var(--cheap); }
        .good .pros-cons { border-left-color: var(--good); }
        .better .pros-cons { border-left-color: var(--better); }
        .best .pros-cons { border-left-color: var(--best); }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-radius: 8px;
            overflow: hidden;
            table-layout: fixed;
        }
        th, td {
            padding: 15px 10px;
            text-align: left;
            border-bottom: 1px solid #eee;
            word-wrap: break-word;
        }
        th {
            background: var(--primary);
            color: white;
            font-size: 1.1rem;
        }
        th:first-child, td:first-child {
            width: 20%;
        }
        tr:hover { background-color: #f8f9fa; }
        .highlight { font-weight: bold; color: #495057; }

        .badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            color: white;
        }
        .bg-cheap { background: var(--cheap); }
        .bg-good { background: var(--good); }
        .bg-better { background: var(--better); }
        .bg-best { background: var(--best); }
    </style>
</head>
<body>

<div class="container" id="app">
    <div style="text-align: center; padding: 50px; font-size: 1.2rem; color: var(--primary);">
        Loading Proposal Data...
    </div>
</div>

<script>
    // Fetch the JSON data and render the page
    fetch('data.json')
        .then(response => response.json())
        .then(data => {
            renderApp(data);
        })
        .catch(error => {
            document.getElementById('app').innerHTML = `
                <div style="color: red; text-align: center; padding: 50px; background: white; border-radius: 8px;">
                    <h3>Error loading data.json</h3>
                    <p>If you are opening this file directly from your computer, your browser is blocking the data fetch for security reasons.</p>
                    <p>Please upload these files to GitHub Pages or run a local web server to view the site.</p>
                </div>`;
            console.error('Error:', error);
        });

    function renderApp(data) {
        const app = document.getElementById('app');

        // 1. Build Header
        let navLinksHtml = data.header.navLinks.map(link => `<a href="${link.href}">${link.text}</a>`).join('');
        let headerHtml = `
            <header>
                <h1>${data.header.title}</h1>
                <p class="subtitle">${data.header.subtitle}</p>
                <div class="nav-links">
                    ${navLinksHtml}
                </div>
            </header>
        `;

        // 2. Build MAM Section
        let softwareHtml = data.mamSection.software.map(sw => `
            <div style="flex: 1; background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #dee2e6; min-width: 250px;">
                <h4 style="margin-top: 0; color: var(--primary);">${sw.name}</h4>
                <div style="font-weight: bold; color: var(--good); font-size: 1.2rem; margin-bottom: 10px;">${sw.price}</div>
                <p style="font-size: 0.9rem;">${sw.description}</p>
                <ul style="font-size: 0.9rem; padding-left: 20px;">
                    ${sw.features.map(f => `<li>${f}</li>`).join('')}
                </ul>
            </div>
        `).join('');

        let hardwareHtml = data.mamSection.hardware.map(hw => `
            <div style="flex: 1; min-width: 250px; max-width: 350px; background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px; padding: 15px; text-align: center;">
                <img src="${hw.image}" alt="${hw.name}" style="max-width: 100%; height: 140px; object-fit: contain; margin-bottom: 10px; border-radius: 4px;">
                <h4 style="margin: 0 0 5px 0; color: var(--primary);">${hw.name}</h4>
                <p style="margin: 0; font-size: 0.9rem;">${hw.specs}</p>
                <div style="font-weight: bold; color: var(--primary); margin-top: 10px;">${hw.price}</div>
            </div>
        `).join('');

        let mamHtml = `
            <div id="mam-section" style="background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 40px; scroll-margin-top: 120px;">
                <h2 style="color: var(--primary); border-bottom: 2px solid #eee; padding-bottom: 10px;">${data.mamSection.title}</h2>
                <div style="display: flex; gap: 30px; align-items: center; margin-bottom: 20px; flex-wrap: wrap;">
                    <div style="flex: 2; min-width: 300px;">
                        <h3 style="color: var(--primary);">${data.mamSection.aiSearch.title}</h3>
                        ${data.mamSection.aiSearch.paragraphs.map(p => `<p>${p}</p>`).join('')}
                    </div>
                    <div style="flex: 1; text-align: center; min-width: 300px;">
                        <iframe width="100%" height="200" src="${data.mamSection.aiSearch.videoUrl}" title="Video" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);"></iframe>
                    </div>
                </div>
                <div style="display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap;">
                    ${softwareHtml}
                </div>
                <h3 style="color: var(--primary); border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 40px;">${data.mamSection.hardwareTitle}</h3>
                <div style="display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;">
                    ${hardwareHtml}
                </div>
            </div>
        `;

        // 3. Build Comparison Section
        let compHeaders = data.comparisonSection.headers.map((h, i) => {
            if (i === 0) return `<th>${h}</th>`;
            let badgeClass = i === 1 ? 'bg-cheap' : i === 2 ? 'bg-good' : i === 3 ? 'bg-better' : 'bg-best';
            return `<th><span class="badge ${badgeClass}">${h}</span></th>`;
        }).join('');

        let compRows = data.comparisonSection.rows.map(row => `
            <tr>
                <td class="highlight">${row.feature}</td>
                <td>${row.cheap}</td>
                <td>${row.good}</td>
                <td>${row.better}</td>
                <td>${row.best}</td>
            </tr>
        `).join('');

        let compHtml = `
            <div id="comparison-section" style="margin-bottom: 50px; scroll-margin-top: 120px;">
                <h2 style="text-align: center; color: var(--primary); font-size: 2rem; border-bottom: 3px solid var(--primary); padding-bottom: 10px;">${data.comparisonSection.title}</h2>
                <table>
                    <thead><tr>${compHeaders}</tr></thead>
                    <tbody>${compRows}</tbody>
                </table>
            </div>
        `;

        // 4. Build Tiers Section
        let tiersHtml = data.tiersSection.tiers.map(tier => {
            let imagesHtml = tier.images.length === 1 
                ? `<img src="${tier.images[0].url}" alt="${tier.images[0].caption}">
                   <div style="font-weight: bold; color: var(--primary); font-size: 0.9rem; text-align: center;">${tier.images[0].caption}</div>`
                : `<div class="tier-image-group">
                    ${tier.images.map(img => `
                        <div style="text-align: center;">
                            <img src="${img.url}" alt="${img.caption}">
                            <div style="font-size: 0.8rem; font-weight: bold; margin-top: 5px; color: var(--primary);">${img.caption}</div>
                        </div>
                    `).join('')}
                   </div>`;

            return `
            <div class="tier-block ${tier.id}">
                <div class="tier-header">
                    <h3>${tier.name}</h3>
                    <div class="tier-price">${tier.price}</div>
                </div>
                <div class="tier-layout">
                    <div class="tier-images">
                        ${imagesHtml}
                    </div>
                    <div class="tier-info">
                        <p>${tier.description}</p>
                        <ul>
                            ${tier.items.map(item => `<li>${item}</li>`).join('')}
                        </ul>
                        <div class="pros-cons">
                            <strong>Pros:</strong> ${tier.pros}<br>
                            <strong>Cons:</strong> ${tier.cons}
                        </div>
                    </div>
                </div>
            </div>
            `;
        }).join('');

        let tiersSectionHtml = `
            <div id="tiers-section" style="scroll-margin-top: 120px;">
                <h2 style="text-align: center; margin-bottom: 30px; color: var(--primary); font-size: 2rem; border-bottom: 3px solid var(--primary); padding-bottom: 10px;">${data.tiersSection.title}</h2>
                <p style="text-align: center; margin-bottom: 30px; color: #666;">${data.tiersSection.subtitle}</p>
                ${tiersHtml}
            </div>
        `;

        // 5. Build Backups Section
        let backupsHtml = `
            <div id="backups-section" style="scroll-margin-top: 120px; margin-top: 50px; margin-bottom: 50px;">
                <h2 style="text-align: center; color: var(--primary); font-size: 2rem; border-bottom: 3px solid var(--primary); padding-bottom: 10px;">${data.backupsSection.title}</h2>
                <p style="text-align: center; margin-bottom: 30px; color: #666;">${data.backupsSection.subtitle}</p>
                <div style="display: flex; gap: 30px; flex-wrap: wrap;">
                    <div style="flex: 1; min-width: 300px; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 6px solid var(--good);">
                        <h3 style="color: var(--primary); margin-top: 0;">${data.backupsSection.industryStandard.title}</h3>
                        <p>${data.backupsSection.industryStandard.description}</p>
                        <ul>
                            ${data.backupsSection.industryStandard.items.map(item => `<li>${item}</li>`).join('')}
                        </ul>
                    </div>
                    <div style="flex: 1; min-width: 300px; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 6px solid var(--better);">
                        <h3 style="color: var(--primary); margin-top: 0;">${data.backupsSection.customCoded.title}</h3>
                        <p>${data.backupsSection.customCoded.description}</p>
                        <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; border-left: 4px solid var(--better); font-size: 0.95rem;">
                            <strong>${data.backupsSection.customCoded.workflowTitle}</strong>
                            <ol style="margin-bottom: 0; padding-left: 20px;">
                                ${data.backupsSection.customCoded.workflowSteps.map(step => `<li>${step}</li>`).join('')}
                            </ol>
                        </div>
                    </div>
                </div>
            </div>
        `;

        // Inject everything into the DOM
        app.innerHTML = headerHtml + mamHtml + compHtml + tiersSectionHtml + backupsHtml;
    }
</script>
</body>
</html>
